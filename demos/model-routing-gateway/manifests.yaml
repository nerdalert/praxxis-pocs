# Model Routing Gateway Demo — Praxis routes to real external provider
#
# Praxis replaces Envoy as the model-routing proxy:
#   - Extracts model from request body
#   - Routes to the correct provider cluster
#   - Handles upstream TLS to api.openai.com
#   - Injects provider API key via request_add
#
# Requires: DNS resolution support in Praxis (nerdalert/praxis fork)
# Requires: OPENAI_API_KEY injected into praxis-provider-keys Secret

---
# --- Praxis proxy with provider routing ---

apiVersion: v1
kind: ConfigMap
metadata:
  name: praxis-gateway-config
  namespace: llm
data:
  config.yaml: |
    admin:
      address: "0.0.0.0:9901"
      verbose: true
    insecure_options:
      allow_public_admin: true
    listeners:
      - name: default
        address: "0.0.0.0:8080"
        filter_chains:
          - observability
          - classify
          - inject-credentials
          - route
    filter_chains:
      - name: observability
        filters:
          - filter: request_id
          - filter: access_log
      - name: classify
        filters:
          - filter: model_to_header
            header: X-AI-Model
      - name: inject-credentials
        filters:
          - filter: headers
            request_add:
              - name: "Authorization"
                value: "Bearer OPENAI_API_KEY_PLACEHOLDER"
              - name: "Host"
                value: "api.openai.com"
      - name: route
        filters:
          - filter: router
            routes:
              - path_prefix: "/"
                cluster: openai
          - filter: load_balancer
            clusters:
              - name: openai
                endpoints:
                  - "api.openai.com:443"
                tls:
                  sni: "api.openai.com"
                  verify: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: praxis-gateway
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: praxis-gateway
  template:
    metadata:
      labels:
        app: praxis-gateway
    spec:
      containers:
        - name: praxis
          image: ghcr.io/nerdalert/praxis:maas-dev
          ports:
            - name: http
              containerPort: 8080
            - name: admin
              containerPort: 9901
          volumeMounts:
            - name: config
              mountPath: /etc/praxis/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
          livenessProbe:
            httpGet:
              path: /healthy
              port: admin
      volumes:
        - name: config
          configMap:
            name: praxis-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: praxis-gateway
  namespace: llm
spec:
  selector:
    app: praxis-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: admin
      port: 9901
      targetPort: 9901

---
# --- Gateway route + policy ---

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: praxis-gateway-demo
  namespace: llm
spec:
  parentRefs:
    - name: maas-default-gateway
      namespace: openshift-ingress
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /praxis-gw
      backendRefs:
        - name: praxis-gateway
          port: 8080
---
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: praxis-gateway-auth
  namespace: llm
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: praxis-gateway-demo
  rules:
    authentication:
      kubernetes-tokens:
        kubernetesTokenReview:
          audiences:
            - maas-default-gateway-sa
        metrics: false
        priority: 0
    authorization:
      allow-authenticated:
        metrics: false
        opa:
          allValues: false
          rego: |
            allow {
              input.auth.identity.user.username != ""
            }
        priority: 0
---
apiVersion: kuadrant.io/v1alpha1
kind: TokenRateLimitPolicy
metadata:
  name: praxis-gateway-allow
  namespace: llm
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: praxis-gateway-demo
  limits:
    allow-praxis-gw:
      counters:
        - expression: auth.identity.userid
      rates:
        - limit: 100
          window: 1m
